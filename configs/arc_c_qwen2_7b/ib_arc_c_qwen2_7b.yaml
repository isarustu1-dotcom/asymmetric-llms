_base_: ['../_base_/arc_c.yaml', '../_base_/qwen2_7b.yaml', '../_base_/misc.yaml', '../_base_/edl_schedule.yaml']

process_preds:
    npz_file: "arc_c.npz"

edl_loss_cfg:
    bayesian_loss:
        type: ss
        smooth: null
    # reg_loss is not active (final_reg_weight: 0.0) — VIB handles regularization
    reg_loss:
        type: kl
        modify_alphas: True
    reg_weight_cfg:
        start_epoch: 0.1
        final_reg_weight: 0.0

vib:
    num_noises: 20
    beta: 0.001
    sigma_mult: 0.0
